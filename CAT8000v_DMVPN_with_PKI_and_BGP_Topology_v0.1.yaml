nodes:
  - boot_disk_size: null
    configuration:
      - name: iosxe_config.txt
        content: |-
          hostname Router0
          interface GigabitEthernet1
            ip address 10.0.0.0 255.255.255.254
            no shutdown
          interface GigabitEthernet2
            ip address 10.0.0.4 255.255.255.254
            no shutdown
          interface GigabitEthernet3
            ip address 10.0.0.8 255.255.255.254
            no shutdown
          interface GigabitEthernet4
            ip address 10.0.0.12 255.255.255.254
            no shutdown
          ! DMVPN Hub configuration with PKI encryption
          crypto pki trustpoint TP-self-signed-0
            enrollment selfsigned
            subject-name cn=Router0
            revocation-check none
            rsakeypair TP-self-signed-0
          crypto pki authenticate TP-self-signed-0
          crypto pki enroll TP-self-signed-0
          crypto isakmp profile DMVPN_PROFILE
            match identity address
            keyring DMVPN_KEYRING
          crypto keyring DMVPN_KEYRING
            pre-shared-key address 0.0.0.0 0.0.0.0 key cisco123
          interface Tunnel0
            ip address 10.255.0.1 255.255.255.0
            tunnel source GigabitEthernet1
            tunnel mode gre multipoint
            tunnel key 100
            tunnel protection ipsec profile DMVPN_PROFILE
          router eigrp 100
            network 10.0.0.0 0.0.0.15
          !
          ! Additional PKI and DMVPN hub configs here
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n0
    image_definition: null
